name: Collecte stats hebdomadaire

on:
  schedule:
    - cron: '0 8 * * 1'   # Chaque lundi à 8h UTC
  workflow_dispatch:        # Bouton manuel dans GitHub Actions

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dépendances
        run: pip install requests

      - name: Collecter les stats via Apify
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python collect.py

      - name: Commit history.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --cached --quiet || git commit -m "stats: mise à jour $(date +'%Y-%m-%d')"
          git push

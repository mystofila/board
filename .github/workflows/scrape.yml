name: Scrape stats AFDER

on:
  schedule:
    - cron: '0 8 * * 1'  # Chaque lundi à 8h Paris
  workflow_dispatch:       # Bouton manuel dans GitHub Actions

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Pour pousser history.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python scrape.py

      - name: Commit history.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --staged --quiet || git commit -m "stats: mise à jour $(date '+%Y-%m-%d')"
          git push
